name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    name: Validate skill & scanner
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run automated checks
        run: python tests/run_checks.py

  package:
    name: Build .skill artifact
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - uses: actions/checkout@v4

      - name: Build skill package
        run: make build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: the-sonnopus-humanizer-skill
          path: dist/the-sonnopus-humanizer.skill
          if-no-files-found: error
